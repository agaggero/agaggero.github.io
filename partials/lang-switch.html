<script>
// Make the navbar language-aware:
//  - Click "Home/Research/Teaching" from a *.es.html page → goes to the
//    .es.html counterpart (visitor stays in Spanish).
//  - Click the 🇬🇧/🇪🇸 flag toggle → goes to the equivalent page in the
//    other language (from /research.es, 🇬🇧 → /research, not /index).
//  - Detail pages without a Spanish counterpart (pub/*.html) leave the
//    flag toggle pointing to its respective language home.
//
// Implementation note: we attach a click event handler (with
// preventDefault + explicit navigation) instead of just rewriting the
// href, so the redirect survives any other JS that might reset the
// link's href attribute after page load.
(function () {
  function attachLangSwitch() {
    const path = window.location.pathname;
    const filename = path.split('/').pop() || 'index.html';
    const isES = filename.endsWith('.es.html');
    const slug = filename.replace(/\.es\.html$/, '').replace(/\.html$/, '') || 'index';
    const knownPages = ['index', 'research', 'teaching'];
    const enToEs = {
      'index.html': 'index.es.html',
      'research.html': 'research.es.html',
      'teaching.html': 'teaching.es.html'
    };

    document.querySelectorAll('a.nav-link').forEach(function (link) {
      if (link.dataset.langSwitchBound) return; // idempotent
      const href = link.getAttribute('href');
      if (!href || href.startsWith('http')) return;

      const img = link.querySelector('img');
      let target = null;

      if (img) {
        // Flag toggle
        if (!knownPages.includes(slug)) return;
        const alt = img.getAttribute('alt');
        const dirPrefix = href.replace(/[^/]*$/, '');
        if (alt === 'English') {
          target = dirPrefix + slug + '.html';
        } else if (alt === 'Español') {
          target = dirPrefix + slug + '.es.html';
        }
      } else if (isES) {
        // Regular nav link on a Spanish page
        const fileMatch = href.match(/([^/]+\.html)$/);
        if (!fileMatch) return;
        const page = fileMatch[1];
        if (page in enToEs) {
          target = href.replace(new RegExp(page + '$'), enToEs[page]);
        }
      }

      if (target) {
        link.setAttribute('href', target);
        link.dataset.langSwitchBound = 'true';
        link.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          window.location.href = target;
        });
      }
    });
  }

  // Try as early as possible, then again on window.load as a backup
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', attachLangSwitch);
  } else {
    attachLangSwitch();
  }
  window.addEventListener('load', attachLangSwitch);
})();
</script>
